services:
  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  api:
    restart: unless-stopped
    ports: !reset []

  worker:
    restart: unless-stopped

  beat:
    restart: unless-stopped

  web:
    restart: unless-stopped
    ports: !reset []
    networks:
      - default
      - edge

# 入口反代已迁移到独立 edge（见 mili-shouzhang 仓库 /infra/edge）。
# 本项目不再自带 caddy、不占用 80/443；web 接入外部 edge 网络，
# 由 edge-caddy 按容器名 wechat-batch-rewriter-web-1:80 反代。
networks:
  edge:
    external: true
