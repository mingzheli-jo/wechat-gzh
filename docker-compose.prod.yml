services:
  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  api:
    restart: unless-stopped
    ports: !reset []

  worker:
    restart: unless-stopped

  beat:
    restart: unless-stopped

  web:
    restart: unless-stopped
    ports: !reset []

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  caddy_data:
  caddy_config:
